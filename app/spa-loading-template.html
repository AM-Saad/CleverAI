<style>
    .loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #fff;
        z-index: 9999;
        font-family: Arial, Helvetica, sans-serif;
    }

    .loading-indicator h1 {
        color: #333;
        margin: 0;
    }



    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }


    /* Styles for dark theme */
    @media (prefers-color-scheme: dark) {
        body {
            background-color: black;
            color: white;
        }
    }


#Workspace1,
#Workspace2,
#Workspace3 {
  opacity: 0;
  animation: workspaceLoop 5s infinite;
}

#Workspace1 {
  animation-delay: 1s;
}

#Workspace2 {
  animation-delay: 0.6s;
}

#Workspace3 {
  animation-delay: 0.2s;
}

#Confirm {
  opacity: 0;
  animation: confirmLoop 5s infinite;
}

@keyframes workspaceLoop {
  0% {
    opacity: 0;
    transform: translateY(-20px);
  }

  /* 1. Drop & Stay Still (approx 0.5s - 5s) */
  5%,
  45% {
    opacity: 1;
    transform: translateY(0);
  }

  /* 2. Slide Right (at 5s mark) */
  50%,
  90% {
    opacity: 1;
    transform: translateX(100px);
  }

  /* 3. Disappear (at 10s mark) to prep for next drop */
  95%,
  100% {
    opacity: 0;
    transform: translateX(100px);
  }
}

@keyframes confirmLoop {
  0%,
  48% {
    opacity: 0;
  }

  52%,
  88% {
    opacity: 1;
  }

  92%,
  100% {
    opacity: 0;
  }
}
</style>
