name: Build and Inject Service Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  design-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify generated tokens and token contracts
        run: yarn design:tokens:check

      - name: Enforce design-system tokens
        run: yarn design:check

      - name: Enforce interactive-state conventions
        run: yarn design:states

      - name: Enforce primitive state coverage
        run: yarn design:primitives

      - name: Reject unused design-system primitives
        run: yarn design:primitives:unused

      - name: Reject removed component APIs
        run: yarn design:api

      - name: Enforce component boundaries
        run: yarn design:boundaries

      - name: Enforce WCAG AA contrast
        run: yarn design:contrast

      - name: Enforce application architecture boundaries
        run: yarn arch:check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and inject service worker
        run: yarn build:inject

      - name: Upload built public directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-output
          path: .output/public

      - name: Upload sw.js for quick inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sw-js
          path: .output/public/sw.js
